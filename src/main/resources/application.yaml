spring:
  application:
    name: tourme
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tourmedb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  
 
server:
  port: 8010

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
