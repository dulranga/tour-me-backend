spring:
  application:
    name: tourme
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tourmedb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  
 
server:
  port: 8010

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true
  info:
    title: TourMe API
    description: A bidding platform for finding the best deals when travelling in Sri Lanka
    version: 1.0.0
    contact:
      name: TourMe Support
      email: support@tourme.com
    license:
      name: MIT License

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  storage:
    upload-dir: /uploads
